# Central version catalog for the DSAlgo project.
# Bump a version here once and it applies everywhere it is referenced.
#
# Usage in build.gradle.kts:
#   plugins      { alias(libs.plugins.kotlin.jvm) }
#   dependencies { implementation(libs.hamcrest) }

[versions]
kotlin = "2.4.0"
hamcrest = "3.0"
jetbrains-annotations = "26.1.0"
findbugs-jsr305 = "3.0.2"
junit = "6.1.0"

[libraries]
hamcrest = { module = "org.hamcrest:hamcrest", version.ref = "hamcrest" }
jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains-annotations" }
findbugs-jsr305 = { module = "com.google.code.findbugs:jsr305", version.ref = "findbugs-jsr305" }

# JUnit: the BOM aligns the Jupiter API and the Platform launcher to one version,
# so jupiter/platform-launcher are declared without their own versions.
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
